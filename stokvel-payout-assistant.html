<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stokvel Payout Assistant 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap');

  :root{
    --aubergine-deep:   #241226;
    --aubergine:        #331a37;
    --aubergine-light:  #4a2650;
    --gold:             #d4af5a;
    --gold-bright:      #e8c876;
    --gold-dim:         #a5824a;
    --cream:            #f3ead9;
    --cream-dim:        #cbb9a4;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #3a1f40 0%, var(--aubergine-deep) 55%, #170b1a 100%);
    font-family:'Jost', sans-serif;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    position:relative;
    overflow-x:hidden;
  }

  body::before, body::after{
    content:"";
    position:fixed;
    width:1px; height:100%;
    top:0;
    background:linear-gradient(var(--gold-dim), transparent 20%, transparent 80%, var(--gold-dim));
    opacity:.35;
  }
  body::before{ left:18px; }
  body::after{ right:18px; }

  .stage{
    width:100%;
    max-width:520px;
    position:relative;
  }

  /* ---------- Header ---------- */
  .crest{
    text-align:center;
    margin-bottom:28px;
  }
  .crest .rule{
    width:120px; height:1px;
    margin:0 auto 14px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .crest h1{
    font-family:'Playfair Display', serif;
    font-weight:800;
    letter-spacing:.14em;
    font-size:clamp(2.1rem, 8vw, 2.7rem);
    background:linear-gradient(180deg, var(--gold-bright), var(--gold-dim));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 24px rgba(212,175,90,.25);
  }
  .crest .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--cream-dim);
    font-size:1.05rem;
    letter-spacing:.04em;
    margin-top:4px;
  }
  .crest .yr{
    display:inline-block;
    margin-top:10px;
    font-size:.72rem;
    letter-spacing:.4em;
    color:var(--gold-dim);
    border-top:1px solid rgba(212,175,90,.25);
    border-bottom:1px solid rgba(212,175,90,.25);
    padding:4px 0;
  }

  /* ---------- Circle motif (signature element) ---------- */
  .wheel-wrap{
    position:relative;
    width:220px; height:220px;
    margin:6px auto 22px;
  }
  .wheel-wrap svg{ width:100%; height:100%; overflow:visible; }
  .wheel-track{ fill:none; stroke:rgba(212,175,90,.18); stroke-width:1.5; }
  .wheel-node{
    fill:var(--aubergine-light);
    stroke:var(--gold-dim);
    stroke-width:1.4;
    transition:all .5s cubic-bezier(.34,1.4,.5,1);
  }
  .wheel-node.active{
    fill:var(--gold);
    stroke:var(--gold-bright);
    filter:drop-shadow(0 0 8px rgba(232,200,118,.85));
  }
  .wheel-label{
    font-family:'Jost', sans-serif;
    font-size:6.4px;
    fill:var(--cream-dim);
    letter-spacing:.06em;
  }
  .wheel-label.active{ fill:var(--gold-bright); font-weight:600; }
  .wheel-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
  }
  .wheel-center .eyebrow{
    font-size:.6rem; letter-spacing:.28em; color:var(--gold-dim);
  }
  .wheel-center .big{
    font-family:'Playfair Display', serif;
    font-weight:700; font-size:1.5rem; color:var(--cream);
    margin-top:2px;
  }

  /* ---------- Chat card ---------- */
  .card{
    background:linear-gradient(160deg, rgba(74,38,80,.55), rgba(36,18,38,.75));
    border:1px solid rgba(212,175,90,.25);
    border-radius:18px;
    padding:22px;
    backdrop-filter:blur(6px);
    box-shadow:0 20px 60px rgba(0,0,0,.45);
  }

  .msg{
    display:flex; gap:10px;
    margin-bottom:14px;
    animation:rise .45s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .avatar{
    flex:0 0 30px; width:30px; height:30px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold-dim));
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-weight:700; color:var(--aubergine-deep);
    font-size:.85rem;
  }
  .bubble{
    background:rgba(243,234,217,.06);
    border:1px solid rgba(212,175,90,.16);
    padding:11px 14px;
    border-radius:4px 14px 14px 14px;
    font-size:.92rem;
    line-height:1.5;
    color:var(--cream);
    max-width:100%;
  }
  .bubble b{ color:var(--gold-bright); font-weight:600; }
  .bubble .amt{
    font-family:'Playfair Display', serif;
    font-size:1.15rem;
    color:var(--gold-bright);
  }

  .typing{ display:flex; gap:4px; padding:4px 2px; }
  .typing span{
    width:6px; height:6px; border-radius:50%; background:var(--gold-dim);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25; transform:scale(.8);} 40%{opacity:1; transform:scale(1);} }

  form{
    display:flex; gap:8px; margin-top:16px;
  }
  input[type=text]{
    flex:1;
    background:rgba(0,0,0,.22);
    border:1px solid rgba(212,175,90,.3);
    border-radius:10px;
    padding:12px 14px;
    color:var(--cream);
    font-family:'Jost', sans-serif;
    font-size:.95rem;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input[type=text]::placeholder{ color:var(--cream-dim); opacity:.55; }
  input[type=text]:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(212,175,90,.18);
  }
  button{
    background:linear-gradient(160deg, var(--gold-bright), var(--gold-dim));
    color:var(--aubergine-deep);
    border:none;
    border-radius:10px;
    padding:0 20px;
    font-family:'Jost', sans-serif;
    font-weight:600;
    letter-spacing:.03em;
    cursor:pointer;
    transition:transform .15s, filter .15s;
  }
  button:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  button:active{ transform:translateY(0); }
  button:disabled{ opacity:.5; cursor:default; transform:none; }

  .hint{
    text-align:center;
    font-size:.72rem;
    color:var(--cream-dim);
    margin-top:14px;
    letter-spacing:.02em;
  }

  .again{
    display:block;
    margin:14px auto 0;
    background:transparent;
    border:1px solid rgba(212,175,90,.35);
    color:var(--gold-bright);
    padding:8px 18px;
    border-radius:20px;
    font-size:.8rem;
  }
  .again:hover{ background:rgba(212,175,90,.08); }

  footer{
    text-align:center;
    margin-top:26px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--cream-dim);
    font-size:.95rem;
    letter-spacing:.02em;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="crest">
    <div class="rule"></div>
    <h1>STOKVEL</h1>
    <div class="tagline">Payout Assistant</div>
    <div class="yr">2 0 2 6</div>
  </div>

  <div class="wheel-wrap">
    <svg viewBox="0 0 110 110">
      <circle class="wheel-track" cx="55" cy="55" r="42"></circle>
      <g id="nodes"></g>
    </svg>
    <div class="wheel-center">
      <div class="eyebrow">THE CIRCLE</div>
      <div class="big" id="wheelBig">7</div>
    </div>
  </div>

  <div class="card">
    <div id="chat"></div>

    <form id="askForm">
      <input type="text" id="nameInput" placeholder="Type your first name…" autocomplete="off" />
      <button type="submit" id="sendBtn">Ask</button>
    </form>
  </div>

  <div class="hint">Powered by the group's 2026 rotation · contribution R500 / member / month</div>

  <footer>May the circle of trust and prosperity continue to grow</footer>
</div>

<script>
const schedule = [
  { month: "May",       name: "Soraya Peck" },
  { month: "June",      name: "Fuaad" },
  { month: "July",      name: "Shownees" },
  { month: "August",    name: "Suleiman" },
  { month: "September", name: "Jameela" },
  { month: "October",   name: "Rabia" },
  { month: "November",  name: "Shinaaz" },
];
const CONTRIBUTION = 500;
const MEMBERS = schedule.length;
const PAYOUT = CONTRIBUTION * MEMBERS;

const monthDates = {
  May:"20 May 2026", June:"20 June 2026", July:"20 July 2026",
  August:"20 August 2026", September:"20 September 2026",
  October:"20 October 2026", November:"20 November 2026"
};

const chat = document.getElementById('chat');
const form = document.getElementById('askForm');
const input = document.getElementById('nameInput');
const btn = document.getElementById('sendBtn');
const nodesG = document.getElementById('nodes');
const wheelBig = document.getElementById('wheelBig');

// Build the 7-node circle
const R = 42, CX = 55, CY = 55;
schedule.forEach((s, i) => {
  const angle = (i / schedule.length) * 2 * Math.PI - Math.PI/2;
  const x = CX + R * Math.cos(angle);
  const y = CY + R * Math.sin(angle);
  const lx = CX + (R+13) * Math.cos(angle);
  const ly = CY + (R+13) * Math.sin(angle);

  const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
  circle.setAttribute("cx", x); circle.setAttribute("cy", y);
  circle.setAttribute("r", 5.2);
  circle.setAttribute("class","wheel-node");
  circle.setAttribute("id","node-"+i);
  nodesG.appendChild(circle);

  const label = document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("x", lx); label.setAttribute("y", ly);
  label.setAttribute("text-anchor","middle");
  label.setAttribute("dominant-baseline","middle");
  label.setAttribute("class","wheel-label");
  label.setAttribute("id","label-"+i);
  label.textContent = s.month.slice(0,3);
  nodesG.appendChild(label);
});

function addMsg(html, fromUser=false){
  const row = document.createElement('div');
  row.className = 'msg';
  if(fromUser){
    row.innerHTML = `<div style="flex:1"></div><div class="bubble" style="background:rgba(212,175,90,.14); border-color:rgba(212,175,90,.35);">${html}</div>`;
    row.style.flexDirection='row-reverse';
  } else {
    row.innerHTML = `<div class="avatar">S</div><div class="bubble">${html}</div>`;
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'msg';
  row.id = 'typingRow';
  row.innerHTML = `<div class="avatar">S</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping(){
  const r = document.getElementById('typingRow');
  if(r) r.remove();
}

function normalize(str){
  return str.trim().toLowerCase().replace(/[^a-z]/g,'');
}

function findMatch(query){
  const q = normalize(query);
  if(!q) return null;
  // exact or "contains" match against first name or full entry
  return schedule.find(s => normalize(s.name).includes(q) || q.includes(normalize(s.name.split(' ')[0])));
}

function highlightNode(index){
  schedule.forEach((_, i) => {
    document.getElementById('node-'+i).classList.toggle('active', i === index);
    document.getElementById('label-'+i).classList.toggle('active', i === index);
  });
}

// Opening message
addMsg(`Welcome. I keep track of the 2026 payout rotation for the group.<br>Type your first name below and I'll tell you <b>when</b> your turn is and <b>how much</b> you'll receive.`);

let asked = false;

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = input.value;
  if(!val.trim()) return;

  addMsg(val, true);
  input.value = '';
  btn.disabled = true;

  showTyping();

  setTimeout(() => {
    removeTyping();
    const match = findMatch(val);

    if(match){
      const idx = schedule.indexOf(match);
      highlightNode(idx);
      wheelBig.textContent = match.month.slice(0,3);

      const today = new Date('2026-07-19');
      const payoutDate = new Date(`${match.month} 1, 2026`);
      const isPast = payoutDate < today && match.month !== 'July';
      const statusLine = isPast
        ? `Your slot for this rotation has already passed.`
        : `Mark your calendar — it's coming up.`;

      addMsg(
        `Found you, <b>${match.name}</b>.<br><br>
        Your payout month is <b>${match.month} 2026</b>, due by <b>${monthDates[match.month]}</b>.<br>
        You'll receive <span class="amt">R${PAYOUT.toLocaleString()}</span> (${MEMBERS} members × R${CONTRIBUTION}).<br><br>
        ${statusLine}`
      );

      const again = document.createElement('button');
      again.className = 'again';
      again.textContent = 'Check another name';
      again.onclick = () => {
        again.remove();
        highlightNode(-1);
        wheelBig.textContent = MEMBERS;
        input.focus();
      };
      chat.appendChild(again);

    } else {
      addMsg(
        `I couldn't find "<b>${val}</b>" on this year's list. Double-check the spelling, or reach out to the group admin if you believe this is an error.`
      );
    }

    btn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
  }, 900);
});

input.focus();
</script>

</body>
</html>
