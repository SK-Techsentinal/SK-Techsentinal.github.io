<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S.H.I.E.L.D. — Avengers Initiative Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #050810;
    --panel:    #0a0f1e;
    --border:   #1a2540;
    --red:      #c0392b;
    --red-glow: #e74c3c;
    --gold:     #f39c12;
    --blue:     #1a6fc4;
    --blue-glow:#2980b9;
    --cyan:     #00d4ff;
    --text:     #c8d6e5;
    --dim:      #5a6a7e;
    --white:    #e8f0fe;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.012) 2px,
      rgba(0,212,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* ── GRID BG ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,111,196,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,111,196,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(5,8,16,0.95);
    backdrop-filter: blur(10px);
  }

  .shield-logo {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .shield-emblem {
    width: 42px;
    height: 42px;
    position: relative;
  }

  .shield-emblem svg { width: 100%; height: 100%; }

  .shield-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    color: var(--white);
    line-height: 1;
  }

  .shield-text p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .status-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .status-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .status-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--cyan);
  }

  .threat-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--red);
    padding: 0.4rem 0.9rem;
    animation: pulse-border 2s infinite;
  }

  .threat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red-glow);
    animation: blink 1s infinite;
  }

  .threat-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--red-glow);
    text-transform: uppercase;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 4px rgba(192,57,43,0.3); }
    50% { box-shadow: 0 0 12px rgba(192,57,43,0.6); }
  }

  /* ── MAIN LAYOUT ── */
  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 73px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: rgba(10,15,30,0.9);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: rgba(26,37,64,0.6);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .search-box input:focus { border-color: var(--cyan); }
  .search-box input::placeholder { color: var(--dim); }

  .search-icon {
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 0.7rem;
  }

  .filter-row {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,212,255,0.07);
  }

  .hero-list {
    overflow-y: auto;
    flex: 1;
    padding: 0.5rem 0;
  }

  .hero-list::-webkit-scrollbar { width: 3px; }
  .hero-list::-webkit-scrollbar-track { background: transparent; }
  .hero-list::-webkit-scrollbar-thumb { background: var(--border); }

  .hero-item {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.18s;
    position: relative;
  }

  .hero-item:hover {
    background: rgba(26,37,64,0.5);
    border-left-color: var(--blue);
  }

  .hero-item.active {
    background: rgba(26,111,196,0.12);
    border-left-color: var(--cyan);
  }

  .hero-avatar {
    width: 36px;
    height: 36px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .hero-item-info h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .hero-item-info p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .hero-status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }

  .status-active { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  .status-mia    { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .status-kia    { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ── MAIN PANEL ── */
  .main-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  .panel-top {
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,15,30,0.6);
  }

  .breadcrumb {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .breadcrumb span { color: var(--cyan); }

  .panel-actions {
    display: flex;
    gap: 0.6rem;
  }

  .panel-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .panel-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  /* ── PROFILE VIEW ── */
  .profile-view {
    overflow-y: auto;
    padding: 2.5rem;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 2rem;
    align-items: start;
  }

  .profile-view::-webkit-scrollbar { width: 3px; }
  .profile-view::-webkit-scrollbar-thumb { background: var(--border); }

  /* Profile left column */
  .profile-left {}

  .profile-portrait {
    width: 100%;
    aspect-ratio: 3/4;
    position: relative;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .portrait-bg {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7rem;
    position: relative;
  }

  .portrait-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(5,8,16,0.9) 0%, transparent 50%);
  }

  .portrait-scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
    );
  }

  .portrait-id {
    position: absolute;
    bottom: 0.75rem;
    left: 0.75rem;
    right: 0.75rem;
  }

  .portrait-id h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--white);
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
  }

  .portrait-id p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-transform: uppercase;
  }

  /* Clearance badge */
  .clearance-badge {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid var(--border);
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    background: rgba(10,15,30,0.8);
  }

  .clearance-level {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
  }

  .clearance-info p:first-child {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .clearance-info p:last-child {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Power bars */
  .power-section {
    margin-bottom: 1rem;
  }

  .power-section h4 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .power-bar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .power-bar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--dim);
    width: 80px;
    flex-shrink: 0;
  }

  .power-bar-track {
    flex: 1;
    height: 4px;
    background: rgba(26,37,64,0.8);
    position: relative;
    overflow: hidden;
  }

  .power-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .power-bar-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--white);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Right column */
  .profile-right {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .info-section {
    border: 1px solid var(--border);
    background: rgba(10,15,30,0.6);
    padding: 1.25rem 1.5rem;
  }

  .info-section h4 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem 1.5rem;
  }

  .info-field label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }

  .info-field p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  .bio-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 1.7;
    color: var(--text);
  }

  .abilities-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .ability-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.75rem;
    border: 1px solid;
    text-transform: uppercase;
  }

  .tag-blue  { border-color: var(--blue);  color: var(--blue-glow);  background: rgba(26,111,196,0.1); }
  .tag-red   { border-color: var(--red);   color: var(--red-glow);   background: rgba(192,57,43,0.1); }
  .tag-gold  { border-color: var(--gold);  color: var(--gold);       background: rgba(243,156,18,0.1); }
  .tag-cyan  { border-color: var(--cyan);  color: var(--cyan);       background: rgba(0,212,255,0.08); }

  /* Mission log */
  .mission-row {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(26,37,64,0.5);
  }

  .mission-row:last-child { border-bottom: none; }

  .mission-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    flex-shrink: 0;
    width: 32px;
  }

  .mission-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1;
    margin-bottom: 2px;
  }

  .mission-outcome {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .outcome-success { color: #2ecc71; }
  .outcome-partial { color: var(--gold); }
  .outcome-failed  { color: var(--red-glow); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--dim);
  }

  .empty-state .big-icon { font-size: 4rem; opacity: 0.2; }

  .empty-state h3 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ── COUNTER ── */
  .sidebar-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: var(--dim);
  }

  .counter span { color: var(--cyan); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    header { padding: 1rem 1.2rem; }
    .header-status { display: none; }

    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: calc(100vh - 65px); }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 240px; }
    .profile-view { grid-template-columns: 1fr; padding: 1.5rem; }
    .profile-portrait { aspect-ratio: 16/9; max-height: 220px; }
  }

  /* ── TYPING ANIMATION ── */
  .typing::after {
    content: '_';
    animation: blink 1s infinite;
  }

  /* ── CORNER DECORATIONS ── */
  .corner-tl, .corner-br {
    position: absolute;
    width: 14px;
    height: 14px;
  }
  .corner-tl { top: 0; left: 0; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  .relative { position: relative; }

  /* entrance anim */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .profile-view { animation: slideIn 0.3s ease; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="shield-logo">
    <div class="shield-emblem">
      <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="21,2 40,12 40,28 21,40 2,28 2,12" fill="none" stroke="#1a6fc4" stroke-width="1.5"/>
        <polygon points="21,7 35,15 35,27 21,35 7,27 7,15" fill="none" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="21" cy="21" r="6" fill="none" stroke="#c0392b" stroke-width="1.5"/>
        <line x1="21" y1="7" x2="21" y2="15" stroke="#00d4ff" stroke-width="1"/>
        <line x1="21" y1="27" x2="21" y2="35" stroke="#00d4ff" stroke-width="1"/>
        <line x1="7"  y1="15" x2="15" y2="19" stroke="#00d4ff" stroke-width="1"/>
        <line x1="27" y1="19" x2="35" y2="15" stroke="#00d4ff" stroke-width="1"/>
        <line x1="7"  y1="27" x2="15" y2="23" stroke="#00d4ff" stroke-width="1"/>
        <line x1="27" y1="23" x2="35" y2="27" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="21" cy="21" r="2" fill="#c0392b"/>
      </svg>
    </div>
    <div class="shield-text">
      <h1>S.H.I.E.L.D.</h1>
      <p>Avengers Initiative · Personnel Database · Level 7 Access</p>
    </div>
  </div>

  <div class="header-status">
    <div class="status-item">
      <span class="status-label">Clearance</span>
      <span class="status-value">LEVEL 7</span>
    </div>
    <div class="status-item">
      <span class="status-label">Agent</span>
      <span class="status-value">SK-0042</span>
    </div>
    <div class="threat-badge">
      <div class="threat-dot"></div>
      <span class="threat-text">Threat Level: High</span>
    </div>
  </div>
</header>

<!-- APP LAYOUT -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>// Operative Roster</h2>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search operatives..." oninput="filterHeroes()" />
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
        <button class="filter-btn" onclick="setFilter('mia', this)">MIA</button>
        <button class="filter-btn" onclick="setFilter('avenger', this)">Avenger</button>
        <button class="filter-btn" onclick="setFilter('guardian', this)">Guardian</button>
      </div>
    </div>

    <div class="hero-list" id="heroList"></div>

    <div class="sidebar-footer">
      <span class="counter">Operatives: <span id="heroCount">0</span></span>
      <span class="counter">Active: <span id="activeCount">0</span></span>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    <div class="panel-top">
      <div class="breadcrumb">DATABASE / PERSONNEL / <span id="breadcrumbName">SELECT OPERATIVE</span></div>
      <div class="panel-actions">
        <button class="panel-btn">⬇ EXPORT</button>
        <button class="panel-btn">⊞ COMPARE</button>
        <button class="panel-btn" onclick="openRandom()">⟳ RANDOM</button>
      </div>
    </div>

    <div id="mainContent">
      <div class="empty-state">

let currentFilter = 'all';
let currentHero = null;

function getStatusClass(s) {
  return s === 'active' ? 'status-active' : s === 'mia' ? 'status-mia' : 'status-kia';
}

function getStatusLabel(s) {
  return s === 'active' ? 'ACTIVE' : s === 'mia' ? 'M.I.A.' : 'K.I.A.';
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('heroList');
  const filtered = heroes.filter(h => {
    const matchFilter = currentFilter === 'all' || h.status === currentFilter || h.team === currentFilter;
    const matchSearch = h.name.toLowerCase().includes(q) || h.alias.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  list.innerHTML = filtered.map(h => `
    <div class="hero-item ${currentHero && currentHero.id === h.id ? 'active' : ''}" onclick="selectHero(${h.id})">
      <div class="hero-avatar" style="background:${h.color}22; border:1px solid ${h.color}44;">${h.emoji}</div>
      <div class="hero-item-info">
        <h3>${h.alias}</h3>
        <p>${h.name}</p>
      </div>
      <div class="hero-status-dot ${getStatusClass(h.status)}"></div>
    </div>
  `).join('');

  document.getElementById('heroCount').textContent = filtered.length;
  document.getElementById('activeCount').textContent = filtered.filter(h => h.status === 'active').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterHeroes() { renderList(); }

function selectHero(id) {
  currentHero = heroes.find(h => h.id === id);
  renderList();
  document.getElementById('breadcrumbName').textContent = currentHero.alias.toUpperCase();
  renderProfile();
}

function openRandom() {
  const r = heroes[Math.floor(Math.random() * heroes.length)];
  selectHero(r.id);
}

function renderProfile() {
  const h = currentHero;
  const statKeys = ['strength','intelligence','speed','durability','energy'];
  const statColors = {strength:'#c0392b',intelligence:'#f39c12',speed:'#00d4ff',durability:'#27ae60',energy:'#9b59b6'};

  const powerBars = statKeys.map(k => `
    <div class="power-bar-item">
      <span class="power-bar-label">${k.toUpperCase()}</span>
      <div class="power-bar-track">
        <div class="power-bar-fill" style="width:${h.stats[k]}%; background:${statColors[k]};"></div>
      </div>
      <span class="power-bar-val">${h.stats[k]}</span>
    </div>
  `).join('');

  const abilities = h.abilities.map(a => `<span class="ability-tag ${a.tag}">${a.label}</span>`).join('');

  const missions = h.missions.map((m, i) => `
    <div class="mission-row">
      <span class="mission-num">#${String(i+1).padStart(2,'0')}</span>
      <div>
        <div class="mission-name">${m.name}</div>
        <div class="mission-outcome outcome-${m.outcome}">${m.outcome.toUpperCase()}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="profile-view">
      <div class="profile-left">
        <div class="profile-portrait">
          <div class="portrait-bg" style="background:linear-gradient(135deg,${h.color}33,${h.color}11);">
            <span style="font-size:7rem">${h.emoji}</span>
          </div>
          <div class="portrait-overlay"></div>
          <div class="portrait-scanline"></div>
          <div class="portrait-id">
            <h2>${h.alias}</h2>
            <p>${h.name}</p>
          </div>
        </div>

        <div class="clearance-badge relative">
          <div class="corner-tl"></div>
          <div class="corner-br"></div>
          <div class="clearance-level" style="color:${h.clearanceColor}">${h.clearance}</div>
          <div class="clearance-info">
            <p>Security Clearance</p>
            <p style="color:${h.clearanceColor}">${h.clearanceLabel} Access</p>
          </div>
        </div>

        <div class="power-section">
          <h4>// Combat Statistics</h4>
          ${powerBars}
        </div>
      </div>

      <div class="profile-right">
        <div class="info-section">
          <h4>// Personnel Data</h4>
          <div class="info-grid">
            <div class="info-field"><label>Date of Birth</label><p>${h.dob}</p></div>
            <div class="info-field"><label>Origin</label><p>${h.origin}</p></div>
            <div class="info-field"><label>Affiliation</label><p>${h.affiliation}</p></div>
            <div class="info-field"><label>Specialisation</label><p>${h.specialisation}</p></div>
            <div class="info-field"><label>Status</label>
              <p style="color:${h.status==='active'?'#2ecc71':h.status==='mia'?'#f39c12':'#e74c3c'}">${getStatusLabel(h.status)}</p>
            </div>
            <div class="info-field"><label>Operative ID</label><p>AV-${String(h.id).padStart(4,'0')}</p></div>
          </div>
        </div>

        <div class="info-section">
          <h4>// Operative Biography</h4>
          <p class="bio-text">${h.bio}</p>
        </div>

        <div class="info-section">
          <h4>// Confirmed Abilities</h4>
          <div class="abilities-list">${abilities}</div>
        </div>

        <div class="info-section">
          <h4>// Mission Log</h4>
          ${missions}
        </div>
      </div>
    </div>
  `;
}
